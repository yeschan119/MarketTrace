# MarketTrace local infrastructure.
# See .omc/plans/market-trace-roadmap.md for the full roadmap.
#
# Slice scope: a single PostgreSQL service. The backend/web application
# services are scaffolded here (commented out) for a later phase.

services:
  postgres:
    image: postgres:16
    container_name: markettrace-postgres
    environment:
      POSTGRES_DB: markettrace
      POSTGRES_USER: markettrace
      POSTGRES_PASSWORD: markettrace
    ports:
      - "5432:5432"
    volumes:
      - markettrace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U markettrace -d markettrace"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Enabled in a later phase ---
