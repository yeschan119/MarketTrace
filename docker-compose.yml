  #     postgres:
  #       condition: service_healthy
  #   ports:
  #     - "8000:8000"
  #   command: uvicorn markettrace.api.main:app --host 0.0.0.0 --port 8000
  #
  # web:
  #   build: ./web
  #   environment:
  #     NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
  #   depends_on:
  #     - backend
  #   ports:
  #     - "3000:3000"

volumes:
  markettrace_pgdata:
